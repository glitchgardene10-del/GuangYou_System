<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>行政作業中心 - 光祐長照</title>
    
    <script src="permissions.js"></script>
    <script src="auth-guard.js"></script>
    <script type="module" src="config.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    
    <style> 
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0f9ff; color: #0f172a; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden bg-slate-50">

    <div id="loading-screen" class="fixed inset-0 bg-slate-50 z-50 flex items-center justify-center">
        <div class="text-slate-400 font-bold animate-pulse">系統連線中...</div>
    </div>

    <div id="portal-section" class="hidden w-full max-w-lg z-10 animate-fade-in">
        <div class="flex justify-between items-end mb-6 px-2">
            <div>
                <h1 class="text-2xl font-black text-slate-800">早安，<span id="user-name" class="text-blue-600">---</span></h1>
                <p class="text-slate-500 text-sm">請選擇要執行的作業：</p>
            </div>
            <button onclick="logout()" class="text-xs text-slate-400 hover:text-slate-600 border px-3 py-1 rounded-full transition hover:bg-slate-100">登出</button>
        </div>

        <div id="portal-cards" class="grid gap-4">
             
            <div id="card-income" onclick="goTo('income_management.html')" class="card-hover bg-white p-6 rounded-2xl cursor-pointer border-l-8 border-indigo-500 shadow-sm flex items-center gap-4 transition hover:bg-indigo-50">
                <div class="bg-indigo-100 text-indigo-600 w-16 h-16 rounded-full flex items-center justify-center text-3xl">💰</div>
                <div>
                    <h2 class="text-xl font-bold text-slate-800">收款與派單</h2>
                    <p class="text-sm text-slate-500">列印收費單、登記現金收款</p>
                </div>
            </div>

            <div id="card-expense" onclick="goTo('expense_log.html')" class="card-hover bg-white p-6 rounded-2xl cursor-pointer border-l-8 border-emerald-500 shadow-sm flex items-center gap-4 transition hover:bg-emerald-50">
                <div class="bg-emerald-100 text-emerald-600 w-16 h-16 rounded-full flex items-center justify-center text-3xl">📝</div>
                <div>
                    <h2 class="text-xl font-bold text-slate-800">零用金流水帳</h2>
                    <p class="text-sm text-slate-500">登記日常支出 (便當、加油)</p>
                </div>
            </div>

            <div id="card-bill" onclick="goTo('bill_reminder.html')" class="card-hover bg-white p-6 rounded-2xl cursor-pointer border-l-8 border-yellow-500 shadow-sm flex items-center gap-4 transition hover:bg-yellow-50">
                <div class="bg-yellow-100 text-yellow-600 w-16 h-16 rounded-full flex items-center justify-center text-3xl">🔔</div>
                <div>
                    <h2 class="text-xl font-bold text-slate-800">帳單/請款提報</h2>
                    <p class="text-sm text-slate-500">上傳待繳帳單，提醒老闆匯款</p>
                </div>
            </div>
        </div>

        <div id="no-accounting-access" class="hidden mt-6 bg-white border border-slate-200 rounded-2xl p-6 text-center text-slate-500 shadow-sm">
            目前尚未開通財務作業權限，請聯繫管理員於考勤後台開通。
        </div>
        
        <div class="mt-8 text-center text-xs text-slate-300">
            Kuang-You Internal System v2.2
        </div>
    </div>

    <script>
        // 綁定全域函式
        window.logout = logout;
        window.goTo = goTo;

        // 等待 config.js 初始化
        const checkInit = setInterval(() => {
            if (window.auth) {
                clearInterval(checkInit);
                initPortal();
            }
        }, 100);

        function initPortal() {
            // auth-guard.js 會負責擋人，能執行到這裡代表已登入
            try {
                const session = sessionStorage.getItem('kuangyou_user');
                if (session) {
                    const user = JSON.parse(session);
                    const permissions = window.KuangYouPermissions;
                    const isBoss = permissions ? permissions.isBoss(user.role) : ['manager', 'super_admin'].includes(user.role);
                    const hasAccountingAccess = isBoss || Boolean(user.grants?.allowedAccounting);

                    document.getElementById('user-name').innerText = user.name || '夥伴';
                    document.getElementById('portal-cards').classList.toggle('hidden', !hasAccountingAccess);
                    document.getElementById('no-accounting-access').classList.toggle('hidden', hasAccountingAccess);
                    document.getElementById('loading-screen').classList.add('hidden');
                    document.getElementById('portal-section').classList.remove('hidden');
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function logout() {
            if(confirm("確定登出？")) {
                await window.signOut(window.auth);
                sessionStorage.removeItem('kuangyou_user');
                window.location.href = 'index.html';
            }
        }

        function goTo(url) { window.location.href = url; }
    </script>

    <style>
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</body>
</html>
