<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光祐會計內帳系統 (v18.4 應收傳票防呆保護版)</title>
    
    <script src="auth-guard.js"></script>
    <script type="module" src="config.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const SAFETY_PASSWORD = "8888"; 

        const maskName = (name) => {
            if (!name) return "";
            const len = name.length;
            if (len === 2) return name[0] + "○"; 
            if (len === 3) return name[0] + "○" + name[2]; 
            return name[0] + "○○" + name.substring(3); 
        };

        const AccountingApp = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [journals, setJournals] = useState([]);
            const [accounts, setAccounts] = useState([]); 
            const [loading, setLoading] = useState(false);
            const [syncMonth, setSyncMonth] = useState(dayjs().subtract(1, 'month').format('YYYY-MM'));
            const [isAuthReady, setIsAuthReady] = useState(false);
            const [currentUser, setCurrentUser] = useState(JSON.parse(sessionStorage.getItem('kuangyou_user') || '{}'));
            
            const [pettyCashBalance, setPettyCashBalance] = useState(0); 
            const [journalFilterMonth, setJournalFilterMonth] = useState(dayjs().format('YYYY-MM'));
            const [ledgerFilterMonth, setLedgerFilterMonth] = useState(dayjs().format('YYYY-MM'));

            const [showModal, setShowModal] = useState(false);
            const [entryDate, setEntryDate] = useState(dayjs().format('YYYY-MM-DD'));
            const [entryDesc, setEntryDesc] = useState('');
            const [entryRows, setEntryRows] = useState([{ account: '', debit: 0, credit: 0 }, { account: '', debit: 0, credit: 0 }]);

            const [showPayrollModal, setShowPayrollModal] = useState(false);
            const [payrollEmployees, setPayrollEmployees] = useState([]);
            const [selectedAccount, setSelectedAccount] = useState('');
            
            const fileInputRef = useRef(null);

            useEffect(() => {
                const timer = setInterval(() => {
                    if (window.db && window.auth) {
                        clearInterval(timer);
                        setIsAuthReady(true);
                    }
                }, 100);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (isAuthReady) { fetchJournals(); fetchAccounts(); fetchPettyCash(); }
            }, [isAuthReady]);

            const fetchPettyCash = async () => { try { const docSnap = await window.getDoc(window.doc(window.db, "system_settings", "petty_cash")); if(docSnap.exists()) setPettyCashBalance(docSnap.data().balance || 0); } catch(e) {} };
            const fetchJournals = async () => { setLoading(true); try { const q = window.query(window.collection(window.db, "accounting_journal"), window.orderBy("date", "desc")); const snap = await window.getDocs(q); const list = []; snap.forEach(d => list.push({ id: d.id, ...d.data() })); setJournals(list); } catch (e) { console.error(e); } setLoading(false); };
            const fetchAccounts = async () => { try { const q = window.query(window.collection(window.db, "accounting_accounts"), window.orderBy("code")); const snap = await window.getDocs(q); const list = []; snap.forEach(d => list.push(d.data())); setAccounts(list); } catch (e) { console.error(e); } };

            const dashboardData = useMemo(() => {
                let totalBank = 0; let totalCashBoss = 0; let revenueThisMonth = 0; let expenseThisMonth = 0; let personnelCost = 0; 
                const today = dayjs(); const currentMonthPrefix = today.format('YYYY-MM'); const last6Months = [];
                for(let i=5; i>=0; i--) { last6Months.push({ month: today.subtract(i, 'month').format('YYYY-MM'), income: 0, expense: 0 }); }

                journals.forEach(j => {
                    const jMonth = j.date.substring(0, 7);
                    j.entries.forEach(e => {
                        const code = String(e.code || ""); const amount = Number(e.amount);
                        if (['1102', '1103', '1104', '1105'].some(prefix => code.startsWith(prefix))) { if (code !== '1105') { e.type === 'debit' ? totalBank += amount : totalBank -= amount; } }
                        if (code.startsWith('1101')) { e.type === 'debit' ? totalCashBoss += amount : totalCashBoss -= amount; }
                        if (jMonth === currentMonthPrefix) { if (code.startsWith('4')) { e.type === 'credit' ? revenueThisMonth += amount : revenueThisMonth -= amount; } else if (code.startsWith('5')) { e.type === 'debit' ? expenseThisMonth += amount : expenseThisMonth -= amount; if (code.startsWith('51')) personnelCost += amount; } }
                        const monthData = last6Months.find(m => m.month === jMonth); if (monthData) { if (code.startsWith('4')) e.type === 'credit' ? monthData.income += amount : monthData.income -= amount; if (code.startsWith('5')) e.type === 'debit' ? monthData.expense += amount : monthData.expense -= amount; }
                    });
                });
                const netProfit = revenueThisMonth - expenseThisMonth;
                const profitMargin = revenueThisMonth > 0 ? (netProfit / revenueThisMonth * 100).toFixed(1) : 0;
                const personnelPercent = expenseThisMonth > 0 ? (personnelCost / expenseThisMonth * 100).toFixed(1) : 0;
                return { totalBank, totalCashBoss, revenueThisMonth, expenseThisMonth, netProfit, profitMargin, personnelCost, personnelPercent, trend: last6Months };
            }, [journals]);

            const getBig5Length = (str) => {
                let len = 0;
                for (let i = 0; i < str.length; i++) {
                    const c = str.charCodeAt(i);
                    if ((c >= 0x0001 && c <= 0x007e) || (0xff60 <= c && c <= 0xff9f)) { len++; } else { len += 2; }
                }
                return len;
            };

            const generateBankFile = () => {
                const targetEmployees = payrollEmployees.filter(e => !e.isCash && e.bankCode === '006');
                if (targetEmployees.length === 0) return alert("沒有需要匯款的合庫帳號資料！");

                let lines = [];
                let totalAmount = 0;

                targetEmployees.forEach(emp => {
                    if (!emp.bankAccount) return; 
                    const empAccount = emp.bankAccount.replace(/\D/g,''); 
                    const netStr = Math.round(emp.net).toString();
                    const amountStr = netStr.padStart(11, '0') + "00"; 
                    const cleanName = emp.name.replace(/,/g, '').trim(); 
                    
                    let line = "  "; 
                    line += empAccount.padEnd(13, ' '); 
                    line += amountStr; 
                    line += "          "; 
                    line += cleanName; 
                    
                    const currentLen = getBig5Length(line);
                    const targetLen = 80; 
                    if (currentLen < targetLen) line += " ".repeat(targetLen - currentLen);
                    
                    lines.push(line);
                    totalAmount += emp.net;
                });

                const fileString = lines.join("\r\n") + "\r\n";
                const blob = new Blob([fileString], { type: "text/plain;charset=utf-8" });
                saveAs(blob, `result_${dayjs().format('YYYYMMDD')}.txt`);
                alert(`✅ 已匯出 ${targetEmployees.length} 筆資料。\n\n⚠️ 【極度重要】上傳銀行前，請務必按右鍵用「記事本」開啟此檔案 -> 點選「檔案」->「另存新檔」-> 下方編碼選擇「ANSI」後存檔，才能成功上傳！`);
            };

            const generateInterbankList = () => {
                const targetEmployees = payrollEmployees.filter(e => !e.isCash && e.bankCode !== '006');
                if (targetEmployees.length === 0) return alert("沒有跨行轉帳資料！");
                let content = "跨行轉帳清單\n----------------------------------------\n";
                targetEmployees.forEach(e => { content += `姓名: ${e.name}\n銀行: ${e.bankCode} / 帳號: ${e.bankAccount}\n金額: ${e.net}\n----------------------------------------\n`; });
                const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
                saveAs(blob, `interbank_list_${dayjs().format('YYYYMMDD')}.txt`);
            };

            const fetchPayrollData = async () => {
                const checkQ = window.query(window.collection(window.db, "accounting_journal"), window.where("source", "==", `PAYROLL_${syncMonth}`));
                const checkSnap = await window.getDocs(checkQ);
                if(!checkSnap.empty) return alert("⚠️ 該月份薪資已拋轉過！");

                setLoading(true);
                try {
                    const empMap = {};
                    const empSnap = await window.getDocs(window.query(window.collection(window.db, "employees")));
                    empSnap.forEach(doc => {
                        const d = doc.data();
                        empMap[doc.id] = { name: d.name || '未知', bankCode: d.bankCode || '006', bankAccount: d.bankAccount || '' };
                    });

                    let tempList = [];
                    const qCare = window.query(window.collection(window.db, "monthly_records"), window.where("yearMonth", "==", syncMonth));
                    const snapCare = await window.getDocs(qCare);
                    snapCare.forEach(doc => {
                        const d = doc.data();
                        if(d.finalResult) {
                            const empInfo = empMap[d.empId] || { name: d.caregiverName||d.name, bankCode: '006', bankAccount: '' };
                            tempList.push({ 
                                id: doc.id, name: empInfo.name, role: 'caregiver', 
                                gross: Number(d.finalResult.grossSalary)||0, net: Number(d.finalResult.netSalary)||0, pension: Number(d.finalResult.employerPension)||0, totalDeduct: Number(d.finalResult.totalDeduction)||0, laborFee: Number(d.finalResult.laborFee || 0), healthFee: Number(d.finalResult.healthFee || 0),
                                isCash: false, bankCode: empInfo.bankCode, bankAccount: empInfo.bankAccount
                            });
                        }
                    });

                    const docRefAdmin = window.doc(window.db, "salary_records_admin", syncMonth);
                    const snapAdmin = await window.getDoc(docRefAdmin);
                    if(snapAdmin.exists()) {
                        const adminData = snapAdmin.data();
                        Object.keys(adminData).forEach(empId => {
                            const empRecord = adminData[empId];
                            if(empRecord.finalResult) {
                                const empInfo = empMap[empId] || { name: '未知行政', bankCode: '006', bankAccount: '' };
                                tempList.push({ 
                                    id: empId, name: empInfo.name, role: 'admin', 
                                    gross: Number(empRecord.finalResult.grossSalary)||0, net: Number(empRecord.finalResult.netSalary)||0, pension: Number(empRecord.finalResult.employerPension)||0, totalDeduct: Number(empRecord.finalResult.totalDeduction)||0, laborFee: Number(empRecord.snapshot?.laborIns || 0), healthFee: Number(empRecord.snapshot?.healthIns || 0),
                                    isCash: false, bankCode: empInfo.bankCode, bankAccount: empInfo.bankAccount
                                });
                            }
                        });
                    }

                    if (tempList.length === 0) alert(`❌ [${syncMonth}] 查無資料`);
                    else {
                        tempList.sort((a,b) => (a.role === b.role) ? 0 : (a.role === 'admin' ? -1 : 1));
                        setPayrollEmployees(tempList);
                        setShowPayrollModal(true);
                    }
                } catch(e) { console.error(e); alert("讀取薪資資料失敗"); }
                setLoading(false);
            };

            const togglePaymentMethod = (index) => { const newList = [...payrollEmployees]; newList[index].isCash = !newList[index].isCash; setPayrollEmployees(newList); };

            const confirmPayrollSync = async () => {
                setLoading(true);
                try {
                    const batch = window.writeBatch(window.db);
                    let grossCare = 0, grossAdmin = 0, totalPension = 0; let payoutBank = 0, payoutCash = 0; let sumLabor = 0, sumHealth = 0, sumOtherDeduct = 0;
                    payrollEmployees.forEach(emp => {
                        if (emp.role === 'caregiver') grossCare += emp.gross; else grossAdmin += emp.gross;
                        totalPension += emp.pension;
                        if (emp.isCash) payoutCash += emp.net; else payoutBank += emp.net;
                        if (emp.laborFee > 0 || emp.healthFee > 0) { sumLabor += emp.laborFee; sumHealth += emp.healthFee; sumOtherDeduct += (emp.totalDeduct - emp.laborFee - emp.healthFee); } else { sumOtherDeduct += emp.totalDeduct; }
                    });
                    const entries = [];
                    if (grossCare > 0) entries.push({ type: 'debit', code: '5101', name: '薪資支出-居服員', amount: grossCare });
                    if (grossAdmin > 0) entries.push({ type: 'debit', code: '5101', name: '薪資支出-行政', amount: grossAdmin });
                    if (totalPension > 0) entries.push({ type: 'debit', code: '5102', name: '退休金支出', amount: totalPension });
                    if (payoutBank > 0) entries.push({ type: 'credit', code: '1102', name: '銀行存款', amount: payoutBank });
                    if (payoutCash > 0) entries.push({ type: 'credit', code: '1101', name: '庫存現金', amount: payoutCash });
                    if (sumLabor > 0) entries.push({ type: 'credit', code: '2202', name: '應付勞保費', amount: sumLabor });
                    if (sumHealth > 0) entries.push({ type: 'credit', code: '2203', name: '應付健保費', amount: sumHealth });
                    if (sumOtherDeduct > 0) entries.push({ type: 'credit', code: '2201', name: '其他代扣款', amount: sumOtherDeduct });
                    if (totalPension > 0) entries.push({ type: 'credit', code: '2204', name: '應付退休金', amount: totalPension });
                    const journalRef = window.doc(window.collection(window.db, "accounting_journal"));
                    batch.set(journalRef, { date: dayjs().format('YYYY-MM-DD'), description: `${syncMonth} 薪資發放`, source: `PAYROLL_${syncMonth}`, entries, totalAmount: grossCare + grossAdmin + totalPension, createdAt: new Date().toISOString(), recorder: currentUser.name });
                    await batch.commit(); alert("✅ 薪資拋轉成功！"); setShowPayrollModal(false); fetchJournals();
                } catch(e) { alert("失敗：" + e.message); }
                setLoading(false);
            };

            const syncExpenses = async () => {
                setLoading(true); 
                try { 
                    const q = window.query(window.collection(window.db, "accounting_expenses"), window.where("status", "==", "pending")); 
                    const snap = await window.getDocs(q); 
                    
                    if (snap.empty) { alert("沒有未入帳的流水帳"); setLoading(false); return; } 
                    if(!confirm(`準備拋轉 ${snap.size} 筆流水帳，系統將依「原始發生日期」逐筆產生傳票？`)) { setLoading(false); return; } 
                    
                    let batchOps = window.writeBatch(window.db); 
                    let count = 0;
                    
                    snap.forEach(doc => { 
                        const d = doc.data(); 
                        const amount = Number(d.amount); 
                        let debitCode, creditCode, debitName, creditName; 
                        const getAccName = (code) => { const acc = accounts.find(a => a.code === code); return acc ? acc.name : code; };

                        if (d.type === 'expense') { 
                            const matchedAccount = accounts.find(acc => acc.name === d.category); 
                            debitCode = matchedAccount ? matchedAccount.code : "5299"; 
                            debitName = matchedAccount ? matchedAccount.name : `${d.category || '雜項'} (未分類)`; 
                            if (d.payer === 'petty_cash') { creditCode = '1105'; } else if (d.payer === 'boss_paid') { creditCode = '2801'; } else if (d.payer === 'bank') { creditCode = '1102'; } else { creditCode = d.payer; } 
                            if (creditCode === '1101' && d.payer === 'petty_cash') creditCode = '1105';
                            creditName = getAccName(creditCode);
                        } else if (d.type === 'income') { 
                            debitCode = '1105'; debitName = '零用金'; creditCode = d.payer; creditName = getAccName(creditCode); 
                        } else if (d.type === 'return') { 
                            debitCode = d.payer; debitName = getAccName(debitCode); creditCode = '1105'; creditName = '零用金'; 
                        } 
                        
                        const entries = [{ type: 'debit', code: debitCode, name: debitName, amount }, { type: 'credit', code: creditCode, name: creditName, amount }];
                        const journalRef = window.doc(window.collection(window.db, "accounting_journal")); 
                        batchOps.set(journalRef, { date: d.date, description: `[流水帳] ${d.item}`, source: 'EXPENSE_IMPORT', entries, totalAmount: amount, relatedExpenseIds: [doc.id], createdAt: new Date().toISOString(), recorder: currentUser.name }); 
                        batchOps.update(doc.ref, { status: 'locked', lockedAt: new Date().toISOString(), linkedJournalId: journalRef.id }); 
                        count++;
                    }); 
                    await batchOps.commit(); alert(`✅ 成功依日期拋轉 ${count} 筆傳票！`); fetchJournals(); 
                } catch(e) { console.error(e); alert("失敗：" + e.message); } 
                setLoading(false);
            };

            const deleteEntry = async (id) => { 
                if(!confirm("確定刪除此傳票？\n如果是流水帳或帳單支付，相關紀錄將會回復(Pending/Unpaid)。")) return; 
                setLoading(true); 
                try { 
                    const docRef = window.doc(window.db, "accounting_journal", id); 
                    const docSnap = await window.getDoc(docRef); 
                    if (docSnap.exists()) { 
                        const data = docSnap.data(); 
                        
                        // ★ 新增防呆：禁止直接在會計端刪除應收帳款產生的傳票
                        if (['AR_USER', 'AR_SUBSIDY', 'AR_USER_COLLECT_CASH', 'AR_GOV'].includes(data.source)) {
                            setLoading(false);
                            return alert("⛔ 系統保護機制：\n\n此傳票由【應收帳款 / 政府核銷】自動產生。\n請至該頁面點擊「撤銷」，系統才會安全地將現金餘額與帳單狀態一併復原，避免帳目脫鉤！");
                        }

                        const batch = window.writeBatch(window.db); 
                        if (data.relatedExpenseIds && data.relatedExpenseIds.length > 0) { 
                            data.relatedExpenseIds.forEach(expId => { 
                                const expRef = window.doc(window.db, "accounting_expenses", expId); 
                                batch.update(expRef, { status: 'pending', lockedAt: window.deleteField() }); 
                            }); 
                        } 
                        if (data.relatedBillId) { 
                            const billRef = window.doc(window.db, "bill_requests", data.relatedBillId); 
                            batch.update(billRef, { status: 'pending', paidAt: window.deleteField(), payer: window.deleteField(), paymentMethod: window.deleteField(), paymentSource: window.deleteField() }); 
                        } 
                        batch.delete(docRef); 
                        await batch.commit(); 
                        alert("✅ 刪除成功，相關紀錄已復原！"); 
                        fetchJournals(); 
                    } 
                } catch(e) { console.error(e); alert("刪除失敗"); } 
                setLoading(false); 
            };

            const filteredJournals = useMemo(() => { return journals.filter(j => j.date.startsWith(journalFilterMonth)); }, [journals, journalFilterMonth]);

            const handleBatchDeleteJournals = async () => {
                if (filteredJournals.length === 0) return alert("本月沒有傳票可刪除。");
                const pwd = prompt(`⚠️ 警告：您即將刪除畫面上顯示的本月 (${journalFilterMonth}) 傳票！\n\n(註：由應收帳款自動產生的傳票將被系統保護跳過)\n\n請輸入密碼確認：`);
                if (pwd !== SAFETY_PASSWORD) return alert("❌ 密碼錯誤！");

                setLoading(true);
                try {
                    let batch = window.writeBatch(window.db);
                    let opCount = 0;
                    let skippedAR = 0;

                    for (const j of filteredJournals) {
                        // ★ 新增防呆：批次刪除時自動安全略過應收款傳票
                        if (['AR_USER', 'AR_SUBSIDY', 'AR_USER_COLLECT_CASH', 'AR_GOV'].includes(j.source)) {
                            skippedAR++;
                            continue;
                        }

                        const docRef = window.doc(window.db, "accounting_journal", j.id);
                        if (j.relatedExpenseIds && j.relatedExpenseIds.length > 0) {
                            j.relatedExpenseIds.forEach(expId => {
                                const expRef = window.doc(window.db, "accounting_expenses", expId);
                                batch.update(expRef, { status: 'pending', lockedAt: window.deleteField() });
                                opCount++;
                            });
                        }
                        if (j.relatedBillId) {
                            const billRef = window.doc(window.db, "bill_requests", j.relatedBillId);
                            batch.update(billRef, { status: 'pending', paidAt: window.deleteField(), payer: window.deleteField(), paymentMethod: window.deleteField(), paymentSource: window.deleteField() });
                            opCount++;
                        }
                        
                        batch.delete(docRef);
                        opCount++;

                        if (opCount > 400) {
                            await batch.commit();
                            batch = window.writeBatch(window.db);
                            opCount = 0;
                        }
                    }
                    if (opCount > 0) {
                        await batch.commit();
                    }

                    alert(`✅ 整批刪除成功！\n已刪除並復原一般傳票。\n(系統安全略過了 ${skippedAR} 筆應收款傳票)`);
                    fetchJournals();
                } catch (e) {
                    console.error(e);
                    alert("刪除失敗：" + e.message);
                }
                setLoading(false);
            };

            const handleRowChange = (index, field, value) => { const newRows = [...entryRows]; newRows[index][field] = value; setEntryRows(newRows); };
            const addRow = () => setEntryRows([...entryRows, { account: '', debit: 0, credit: 0 }]);
            const removeRow = (index) => setEntryRows(entryRows.filter((_, i) => i !== index));
            const saveManualEntry = async () => { if (!entryDesc) return alert("請輸入摘要"); const entries = []; let debitSum = 0, creditSum = 0; entryRows.forEach(r => { if (!r.account) return; const acc = accounts.find(a => a.code === r.account); if (Number(r.debit) > 0) { entries.push({ type: 'debit', code: r.account, name: acc?.name||'?', amount: Number(r.debit) }); debitSum += Number(r.debit); } if (Number(r.credit) > 0) { entries.push({ type: 'credit', code: r.account, name: acc?.name||'?', amount: Number(r.credit) }); creditSum += Number(r.credit); } }); if (entries.length === 0 || debitSum !== creditSum) return alert("借貸不平衡"); try { await window.addDoc(window.collection(window.db, "accounting_journal"), { date: entryDate, description: entryDesc, source: 'MANUAL', entries, totalAmount: debitSum, createdAt: new Date().toISOString(), recorder: currentUser.name }); alert("✅ 儲存成功"); setShowModal(false); fetchJournals(); } catch(e) { alert("失敗"); } };
            const ledgerData = useMemo(() => { if(!selectedAccount) return []; let balance = 0; let fullHistory = journals.sort((a,b)=>dayjs(a.date).unix()-dayjs(b.date).unix()).map(j => { const match = j.entries.find(e => e.code === selectedAccount); if(!match) return null; const d = match.type === 'debit' ? Number(match.amount) : 0; const c = match.type === 'credit' ? Number(match.amount) : 0; if(['1','5'].includes(selectedAccount[0])) balance += (d - c); else balance += (c - d); return { date: j.date, desc: j.description, source: j.source, debit: d, credit: c, balance }; }).filter(Boolean); const filterStart = ledgerFilterMonth; const startIndex = fullHistory.findIndex(r => r.date.startsWith(filterStart)); const filteredList = fullHistory.filter(r => r.date.startsWith(filterStart)); if (startIndex > 0) { filteredList.unshift({ date: `${filterStart}-01`, desc: "【期初餘額 / 承前頁】", source: "SYSTEM", debit: 0, credit: 0, balance: fullHistory[startIndex - 1].balance, isOpening: true }); } else if (startIndex === -1 && fullHistory.length > 0 && fullHistory[fullHistory.length-1].date < filterStart) { filteredList.push({ date: `${filterStart}-01`, desc: "【期初餘額】", source: "SYSTEM", debit: 0, credit: 0, balance: fullHistory[fullHistory.length-1].balance, isOpening: true }); } return filteredList; }, [journals, selectedAccount, ledgerFilterMonth]);

                    const blob = new Blob([backupJSON], { type: "application/json;charset=utf-8" });
                    saveAs(blob, `KuangYou_Backup_${dayjs().format('YYYYMMDD_HHmm')}.json`);

                        if (!confirm(`⚠️ 極度危險操作 ⚠️\n\n您正在還原 ${dayjs(json.timestamp).format('YYYY-MM-DD HH:mm')} 的備份檔。\n這將會【覆蓋並取代】雲端上所有的現有資料。\n\n確定要繼續嗎？`)) {

                                                            <td className="p-3 text-right font-mono font-bold text-lg">${new Intl.NumberFormat().format(emp.net)}</td>
                                                            <td className="p-3 text-center cursor-pointer" onClick={()=>togglePaymentMethod(idx)}>
                                                                <div className={`border-2 rounded-lg px-2 py-1 text-xs font-bold transition select-none ${emp.isCash ? 'border-orange-500 bg-orange-100 text-orange-700' : 'border-slate-200 bg-white text-slate-400'}`}>{emp.isCash ? '💵 現金' : '🏦 轉帳'}</div>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                            <tfoot className="bg-slate-50 font-bold">
                                                <tr>
                                                    <td colSpan="3" className="p-3 text-right">總計：</td>
                                                    <td className="p-3 text-right border-t-2 border-slate-300">${new Intl.NumberFormat().format(payrollEmployees.reduce((s,e)=>s+e.net,0))}</td>
                                                    <td className="p-3 text-center text-xs text-slate-500">(現金: ${new Intl.NumberFormat().format(payrollEmployees.filter(e=>e.isCash).reduce((s,e)=>s+e.net,0))})</td>
                                                </tr>
                                            </tfoot>
                                        </table>
                                    </div>
                                    <div className="p-4 border-t bg-slate-50 flex justify-end gap-2 rounded-b-2xl">
                                        <button onClick={()=>setShowPayrollModal(false)} className="px-6 py-2 text-slate-500 font-bold hover:bg-slate-100 rounded">取消</button>
                                        <button onClick={confirmPayrollSync} className="px-6 py-2 bg-emerald-600 text-white rounded font-bold hover:bg-emerald-700 shadow-lg flex items-center gap-2"><span>✅ 確認拋轉傳票</span></button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {showModal && (<div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm"><div className="bg-white w-full max-w-3xl rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]"><div className="bg-slate-800 p-4 text-white font-bold flex justify-between items-center"><span>新增傳票 (Manual Entry)</span><button onClick={()=>setShowModal(false)} className="text-slate-400 hover:text-white">✕</button></div><div className="p-6 overflow-y-auto flex-1"><div className="flex gap-4 mb-4"><div className="w-1/3"><label className="block text-xs font-bold text-slate-500 mb-1">日期</label><input type="date" value={entryDate} onChange={e=>setEntryDate(e.target.value)} className="w-full border rounded p-2" /></div><div className="w-2/3"><label className="block text-xs font-bold text-slate-500 mb-1">摘要說明</label><input type="text" value={entryDesc} onChange={e=>setEntryDesc(e.target.value)} className="w-full border rounded p-2" placeholder="例如: 開帳餘額、現金調整" /></div></div><table className="w-full text-sm mb-4"><thead className="bg-slate-50 text-slate-500 font-bold text-xs"><tr><th className="p-2 text-left">會計科目</th><th className="p-2 text-right">借方 (Debit)</th><th className="p-2 text-right">貸方 (Credit)</th><th className="p-2"></th></tr></thead><tbody>{entryRows.map((row, idx) => (<tr key={idx} className="border-b"><td className="p-2"><select className="w-full border rounded p-2 font-mono" value={row.account} onChange={e=>handleRowChange(idx, 'account', e.target.value)}><option value="">請選擇...</option>{accounts.map(a => <option key={a.code} value={a.code}>{a.code} {a.name}</option>)}</select></td><td className="p-2"><input type="number" className="w-full border rounded p-2 text-right" value={row.debit || ''} onChange={e=>handleRowChange(idx, 'debit', e.target.value)} /></td><td className="p-2"><input type="number" className="w-full border rounded p-2 text-right" value={row.credit || ''} onChange={e=>handleRowChange(idx, 'credit', e.target.value)} /></td><td className="p-2 text-center"><button onClick={()=>removeRow(idx)} className="text-red-400 hover:text-red-600 font-bold">×</button></td></tr>))}</tbody><tfoot><tr className="font-bold text-slate-700 bg-slate-50"><td className="p-2 text-right">合計：</td><td className={`p-2 text-right ${entryRows.reduce((s,r)=>s+Number(r.debit),0)!==entryRows.reduce((s,r)=>s+Number(r.credit),0)?'text-red-500':'text-green-600'}`}>{new Intl.NumberFormat().format(entryRows.reduce((s,r)=>s+Number(r.debit),0))}</td><td className={`p-2 text-right ${entryRows.reduce((s,r)=>s+Number(r.debit),0)!==entryRows.reduce((s,r)=>s+Number(r.credit),0)?'text-red-500':'text-green-600'}`}>{new Intl.NumberFormat().format(entryRows.reduce((s,r)=>s+Number(r.credit),0))}</td><td></td></tr></tfoot></table><button onClick={addRow} className="text-blue-600 text-sm font-bold hover:underline">+ 新增一行</button></div><div className="p-4 border-t bg-slate-50 flex justify-end gap-2"><button onClick={()=>setShowModal(false)} className="px-4 py-2 text-slate-500 font-bold">取消</button><button onClick={saveManualEntry} className="px-6 py-2 bg-blue-600 text-white rounded font-bold hover:bg-blue-700 shadow">確認儲存</button></div></div></div>)}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AccountingApp />);
    </script>
</body>
</html>
