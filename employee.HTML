<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>居服員資料庫 (v17.4 完美帳號連動版)</title>
    
    <script src="auth-guard.js"></script>
    <script type="module" src="config.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; } 
        .modal { transition: opacity 0.25s ease; }
        .tab-active-caregiver { background-color: #2563eb; color: white; }
        .tab-active-admin { background-color: #7c3aed; color: white; }
    </style>

    <script type="module">
        // ★ 確保有匯入 setDoc
        import { collection, addDoc, updateDoc, deleteDoc, doc, setDoc, onSnapshot, query, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let employeeList = [];
        let isEditing = false;
        let currentEditId = null;
        let currentFilter = 'active'; 
        let currentRoleTab = 'caregiver'; 
        let currentEmpIdForMonth = null; 
        
        let db, auth; 

        window.openModal = openModal;
        window.closeModal = closeModal;
        window.saveEmployee = saveEmployee;
        window.editEmployee = editEmployee;
        window.deleteEmployee = deleteEmployee;
        window.setFilter = setFilter;
        window.switchRoleTab = switchRoleTab;
        window.openMonthlyModal = openMonthlyModal;
        window.closeMonthlyModal = closeMonthlyModal;
        window.saveMonthlyRecord = saveMonthlyRecord;
        window.deleteMonthlyRecord = deleteMonthlyRecord;
        window.calcTotal = calcTotal;
        window.toggleAdminFields = toggleAdminFields;

        const checkInit = setInterval(() => {
            if (window.db && window.auth) {
                clearInterval(checkInit);
                db = window.db;
                auth = window.auth;

                window.auth.onAuthStateChanged((user) => {
                    if (user) {
                        const q = query(collection(db, "employees"), orderBy("code"));
                        onSnapshot(q, (snapshot) => {
                            employeeList = [];
                            snapshot.forEach(doc => employeeList.push({ id: doc.id, ...doc.data() }));
                            renderTable();
                        }, (error) => {
                            console.error("資料讀取失敗:", error);
                        });
                    } else {
                        console.log("未偵測到 Firebase Auth 登入狀態");
                    }
                });
            }
        }, 100);

        function switchRoleTab(role) {
            currentRoleTab = role;
            const btnCare = document.getElementById('tab-caregiver');
            const btnAdmin = document.getElementById('tab-admin');
            
            if (role === 'caregiver') {
                btnCare.className = "flex-1 py-2 text-center font-bold rounded-l-lg border transition tab-active-caregiver shadow-inner";
                btnAdmin.className = "flex-1 py-2 text-center font-bold rounded-r-lg border transition bg-white text-slate-500 hover:bg-slate-50";
                document.getElementById('list-header').className = "bg-blue-50 text-blue-800 font-bold text-sm border-b border-blue-100";
            } else {
                btnCare.className = "flex-1 py-2 text-center font-bold rounded-l-lg border transition bg-white text-slate-500 hover:bg-slate-50";
                btnAdmin.className = "flex-1 py-2 text-center font-bold rounded-r-lg border transition tab-active-admin shadow-inner";
                document.getElementById('list-header').className = "bg-purple-50 text-purple-800 font-bold text-sm border-b border-purple-100";
            }
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('emp-table-body');
            tbody.innerHTML = "";
            
            let displayList = employeeList.filter(e => {
                if (e.role !== currentRoleTab) return false;
                if (currentFilter === 'active') return !e.resignDate;
                if (currentFilter === 'resigned') return !!e.resignDate;
                return true;
            });

            const totalCaregivers = employeeList.filter(e => e.role === 'caregiver' && !e.resignDate).length;
            const totalAdmins = employeeList.filter(e => e.role === 'admin' && !e.resignDate).length;
            
            document.getElementById('count-caregiver').innerText = totalCaregivers;
            document.getElementById('count-admin').innerText = totalAdmins;

            if (displayList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-slate-400">此分類無資料 (或讀取中...)</td></tr>`;
                return;
            }

            displayList.forEach(emp => {
                const statusBadge = emp.resignDate 
                    ? `<span class="bg-red-100 text-red-700 px-2 py-1 rounded text-xs font-bold">離職 (${emp.resignDate})</span>` 
                    : `<span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold">在職</span>`;

                let salaryInfo = "";
                if (emp.role === 'admin') {
                    salaryInfo = `<div class="text-xs text-slate-500">本薪: ${Number(emp.baseSalary||0).toLocaleString()} ${emp.password ? '<span class="text-purple-500 ml-1">🔒已設密碼</span>' : '<span class="text-red-300 ml-1">⚠️未設密碼</span>'}</div>`;
                } else {
                    salaryInfo = `<div class="text-xs text-slate-500">時薪: ${emp.hourlyWage||230} / 轉場: ${emp.transitWage||196}</div>`;
                }

                const monthlyBtn = emp.role === 'caregiver' 
                    ? `<button onclick="openMonthlyModal('${emp.id}', '${emp.name}')" class="bg-blue-100 text-blue-700 hover:bg-blue-200 px-3 py-1 rounded text-xs font-bold transition shadow-sm mr-2 flex items-center gap-1"><span class="text-xs">📅</span> 月報</button>`
                    : ``;

                let bankDisplay = `<span class="text-slate-300 text-xs">未設定帳號</span>`;
                if (emp.bankAccount) {
                    const bankCode = emp.bankCode || '006';
                    const bankStyle = bankCode !== '006' ? 'text-orange-600 bg-orange-50' : 'text-slate-500';
                    bankDisplay = `<div class="text-xs ${bankStyle} px-1 rounded inline-block font-mono">🏦 (${bankCode}) ${emp.bankAccount}</div>`;
                }

                const seniorityInfo = emp.seniorityDeduction > 0 
                    ? `<div class="mt-1 text-[10px] text-orange-600 bg-orange-50 inline-block px-1 rounded border border-orange-200">⚠️ 年資扣除 ${emp.seniorityDeduction} 天</div>` 
                    : '';

                tbody.innerHTML += `
                    <tr class="border-b hover:bg-slate-50 transition ${emp.resignDate ? 'bg-slate-50 opacity-60' : ''}">
                        <td class="p-4 font-mono text-slate-500 font-bold">${emp.code || '-'}</td>
                        <td class="p-4">
                            <div class="font-bold text-slate-800 text-lg">${emp.name}</div>
                            <div class="text-xs text-slate-400">${emp.idCard || ''}</div>
                            ${bankDisplay}
                        </td>
                        <td class="p-4">
                            <div class="font-mono text-sm">${emp.joinDate}</div>
                            ${statusBadge}
                            ${seniorityInfo}
                        </td>
                        <td class="p-4">${salaryInfo}</td>
                        <td class="p-4 text-right">
                            <div class="flex justify-end items-center">
                                ${monthlyBtn}
                                <button onclick="editEmployee('${emp.id}')" class="bg-white border border-slate-300 text-slate-600 hover:bg-slate-50 px-3 py-1 rounded text-xs font-bold transition shadow-sm mr-2">編輯</button>
                                <button onclick="deleteEmployee('${emp.id}', '${emp.name}')" class="text-red-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-full transition" title="刪除">🗑️</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        // --- 月報功能 ---
        function openMonthlyModal(empId, empName) {
            currentEmpIdForMonth = empId;
            document.getElementById('monthly-emp-name').innerText = empName;
            document.getElementById('monthly-modal').classList.remove('hidden');
            const date = new Date();
            date.setMonth(date.getMonth() - 1);
            document.getElementById('m-month').value = date.toISOString().slice(0, 7); 
            loadMonthlyRecords(empId);
        }

        function closeMonthlyModal() {
            document.getElementById('monthly-modal').classList.add('hidden');
            document.getElementById('monthly-form').reset();
            currentEmpIdForMonth = null;
        }

        function loadMonthlyRecords(empId) {
            const tbody = document.getElementById('monthly-list');
            tbody.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-slate-500">讀取中...</td></tr>';
            const q = query(collection(db, "monthly_records"), where("empId", "==", empId));
            onSnapshot(q, (snapshot) => {
                tbody.innerHTML = "";
                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-slate-400">尚無紀錄</td></tr>';
                    return;
                }
                let records = [];
                snapshot.forEach(doc => records.push({ id: doc.id, ...doc.data() }));
                records.sort((a, b) => b.yearMonth.localeCompare(a.yearMonth));
                records.forEach(d => {
                    const salary = d.salary ? Number(d.salary).toLocaleString() : 0;
                    const baseTotal = d.totalBaseHours || 0;
                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-slate-50 transition">
                            <td class="p-3 text-center font-bold text-slate-700 bg-slate-50">${d.yearMonth}</td>
                            <td class="p-3 text-right font-mono font-bold text-slate-600">$${salary}</td>
                            <td class="p-3 text-right text-blue-600 font-black bg-blue-50/50">${baseTotal} H</td>
                            <td class="p-3 text-right text-xs text-slate-500 leading-tight">
                                <div class="mb-1"><span class="bg-gray-100 px-1 rounded">一般</span> ${d.workHours||0} / 轉 ${d.transitHours||0}</div>
                                <div><span class="bg-orange-50 text-orange-600 px-1 rounded">加班</span> ${d.otWorkHours||0} / 轉 ${d.otTransitHours||0}</div>
                            </td>
                            <td class="p-3 text-center">
                                <button onclick="deleteMonthlyRecord('${d.id}')" class="text-red-400 hover:text-red-600 p-1">🗑️</button>
                            </td>
                        </tr>`;
                });
            });
        }

        async function saveMonthlyRecord() {
            if (!currentEmpIdForMonth) return;
            const yearMonth = document.getElementById('m-month').value;
            const salary = Number(document.getElementById('m-salary').value) || 0;
            const workHours = Number(document.getElementById('m-work').value) || 0;
            const transitHours = Number(document.getElementById('m-transit').value) || 0;
            const otWorkHours = Number(document.getElementById('m-ot-work').value) || 0;
            const otTransitHours = Number(document.getElementById('m-ot-transit').value) || 0;
            const totalBaseHours = parseFloat((workHours + transitHours).toFixed(3));

            if (!yearMonth) return alert("請選擇月份");

            try {
                const q = query(collection(db, "monthly_records"), where("empId", "==", currentEmpIdForMonth), where("yearMonth", "==", yearMonth));
                const snapshot = await getDocs(q);
                
                if (!snapshot.empty) {
                    if(!confirm(`${yearMonth} 的資料已存在，確定要覆蓋嗎？`)) return;
                    const oldDocId = snapshot.docs[0].id;
                    await updateDoc(doc(db, "monthly_records", oldDocId), {
                        salary, workHours, transitHours, otWorkHours, otTransitHours, totalBaseHours, updatedAt: new Date().toISOString()
                    });
                } else {
                    await addDoc(collection(db, "monthly_records"), {
                        empId: currentEmpIdForMonth, yearMonth, salary, workHours, transitHours, otWorkHours, otTransitHours, totalBaseHours, createdAt: new Date().toISOString()
                    });
                }
                document.getElementById('m-salary').value = '';
                document.getElementById('m-work').value = '';
                document.getElementById('m-transit').value = '';
                document.getElementById('m-ot-work').value = '';
                document.getElementById('m-ot-transit').value = '';
                document.getElementById('calc-result').innerText = '0';
            } catch (e) { console.error(e); alert("儲存失敗"); }
        }

        async function deleteMonthlyRecord(id) { if(confirm("確定刪除？")) await deleteDoc(doc(db, "monthly_records", id)); }
        function calcTotal() {
            const w = Number(document.getElementById('m-work').value) || 0;
            const t = Number(document.getElementById('m-transit').value) || 0;
            document.getElementById('calc-result').innerText = (w + t).toFixed(3);
        }

        // --- 員工管理 ---
        function setFilter(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.type === type) { btn.classList.add('bg-slate-800', 'text-white'); btn.classList.remove('bg-white', 'text-slate-600'); } 
                else { btn.classList.remove('bg-slate-800', 'text-white'); btn.classList.add('bg-white', 'text-slate-600'); }
            });
            renderTable();
        }

        function openModal(mode) {
            const modal = document.getElementById('emp-modal');
            const title = document.getElementById('modal-title');
            const form = document.getElementById('emp-form');
            modal.classList.remove('hidden');
            if (mode === 'add') {
                isEditing = false;
                currentEditId = null;
                title.innerText = "➕ 新增員工";
                form.reset();
                document.getElementById('e-role').value = currentRoleTab;
                
                document.getElementById('e-bankCode').value = '006'; 
                document.getElementById('e-seniorityDeduction').value = '0';

                if (currentRoleTab === 'caregiver') {
                    document.getElementById('e-hourlyWage').value = 230;
                    document.getElementById('e-transitWage').value = 196;
                    document.getElementById('e-hourlyBonus').value = 0;
                }
                toggleAdminFields();
                const relevantList = employeeList.filter(e => e.role === currentRoleTab);
                if (relevantList.length > 0) {
                    const codes = relevantList.map(e => parseInt(e.code.replace(/\D/g,'')) || 0);
                    const maxCode = Math.max(...codes);
                    document.getElementById('e-code').value = String(maxCode + 1).padStart(3, '0');
                }
            }
        }

        function closeModal() { document.getElementById('emp-modal').classList.add('hidden'); }

        function toggleAdminFields() {
            const role = document.getElementById('e-role').value;
            const adminSection = document.getElementById('admin-fields');
            const caregiverSection = document.getElementById('caregiver-fields');
            if (role === 'admin') { adminSection.classList.remove('hidden'); caregiverSection.classList.add('hidden'); } 
            else { adminSection.classList.add('hidden'); caregiverSection.classList.remove('hidden'); }
        }

        function editEmployee(id) {
            const emp = employeeList.find(e => e.id === id);
            if (!emp) return;
            isEditing = true;
            currentEditId = id;
            document.getElementById('modal-title').innerText = "✏️ 編輯員工資料";
            document.getElementById('e-code').value = emp.code;
            document.getElementById('e-name').value = emp.name;
            document.getElementById('e-idCard').value = emp.idCard || '';
            
            document.getElementById('e-bankCode').value = emp.bankCode || '006';
            document.getElementById('e-bankAccount').value = emp.bankAccount || '';

            document.getElementById('e-role').value = emp.role;
            document.getElementById('e-join').value = emp.joinDate;
            document.getElementById('e-resign').value = emp.resignDate || "";
            document.getElementById('e-seniorityDeduction').value = emp.seniorityDeduction || 0;

            toggleAdminFields();
            
            document.getElementById('e-baseSalary').value = emp.baseSalary || 0;
            document.getElementById('e-positionBonus').value = emp.positionBonus || 0;
            document.getElementById('e-fuelSubsidy').value = emp.fuelSubsidy || 0;
            document.getElementById('e-insuranceLevel').value = emp.insuranceLevel || 0;
            document.getElementById('e-laborIns').value = emp.laborIns || 0;
            document.getElementById('e-healthIns').value = emp.healthIns || 0;
            document.getElementById('e-healthInsFamily').value = emp.healthInsFamily || 0;
            document.getElementById('e-password').value = emp.password || "";

            document.getElementById('e-pensionRate').value = emp.pensionRate || 0;
            document.getElementById('e-hasLicense').checked = emp.hasLicense || false;
            document.getElementById('e-hourlyWage').value = emp.hourlyWage || 230; 
            document.getElementById('e-hourlyBonus').value = emp.hourlyBonus || 0;
            document.getElementById('e-transitWage').value = emp.transitWage || 196; 
            document.getElementById('emp-modal').classList.remove('hidden');
        }

        async function saveEmployee() {
            const code = document.getElementById('e-code').value.trim();
            const name = document.getElementById('e-name').value.trim();
            const role = document.getElementById('e-role').value;
            const password = document.getElementById('e-password') ? document.getElementById('e-password').value.trim() : '';
            
            if (!name || !code) return alert("請填寫編號與姓名");
            
            const empData = {
                code, name, role,
                idCard: document.getElementById('e-idCard').value.trim(),
                bankCode: document.getElementById('e-bankCode').value.trim() || '006',
                bankAccount: document.getElementById('e-bankAccount').value.trim(),
                joinDate: document.getElementById('e-join').value,
                resignDate: document.getElementById('e-resign').value || null,
                seniorityDeduction: Number(document.getElementById('e-seniorityDeduction').value) || 0,
                baseSalary: Number(document.getElementById('e-baseSalary').value) || 0,
                positionBonus: Number(document.getElementById('e-positionBonus').value) || 0,
                fuelSubsidy: Number(document.getElementById('e-fuelSubsidy').value) || 0,
                insuranceLevel: Number(document.getElementById('e-insuranceLevel').value) || 0,
                laborIns: Number(document.getElementById('e-laborIns').value) || 0,
                healthIns: Number(document.getElementById('e-healthIns').value) || 0,
                healthInsFamily: Number(document.getElementById('e-healthInsFamily').value) || 0,
                password: password, 
                pensionRate: Number(document.getElementById('e-pensionRate').value) || 0,
                hasLicense: document.getElementById('e-hasLicense').checked,
                hourlyWage: Number(document.getElementById('e-hourlyWage').value) || 230,
                hourlyBonus: Number(document.getElementById('e-hourlyBonus').value) || 0,
                transitWage: Number(document.getElementById('e-transitWage').value) || 196,
                updatedAt: new Date().toISOString()
            };

            const btn = document.querySelector('#emp-form button[type="submit"]');
            btn.innerHTML = "儲存中..."; btn.disabled = true;

            try {
                if (isEditing && currentEditId) { 
                    await updateDoc(doc(db, "employees", currentEditId), empData); 
                    closeModal();
                    alert("✅ 更新成功！");
                } else {
                    const qCheck = query(collection(db, "employees"), where("code", "==", code));
                    const snapCheck = await getDocs(qCheck);
                    if(!snapCheck.empty) {
                        btn.innerHTML = "儲存變更"; btn.disabled = false;
                        return alert("編號已存在！");
                    }

                    // ★★★ 真正的解決方案：拿 UID 當作 Document ID (門牌號碼) ★★★
                    if (role === 'admin' && password) {
                        try {
                            const apiKey = window.auth.app.options.apiKey; 
                            const email = `${code}@kuangyou.internal`; 
                            const res = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${apiKey}`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ email, password, returnSecureToken: true })
                            });
                            const authData = await res.json();
                            
                            if (authData.error) {
                                alert(`⚠️ 登入帳號建立失敗 (${authData.error.message})。`);
                                btn.innerHTML = "儲存變更"; btn.disabled = false;
                                return; // 帳號建失敗就先停住，不要寫入資料庫
                            } else {
                                // 成功拿到 UID，用 setDoc 把它當作「文件 ID (門牌)」！
                                const newUid = authData.localId;
                                empData.email = email;
                                await setDoc(doc(db, "employees", newUid), { ...empData, createdAt: new Date().toISOString() });
                                
                                closeModal();
                                alert("✅ 儲存成功！帳號已同步開通。");
                                btn.innerHTML = "儲存變更"; btn.disabled = false;
                                return; // 已經存好了，直接 return 結束
                            }
                        } catch (apiErr) {
                            console.error("建立 Auth 帳號發生錯誤:", apiErr);
                        }
                    }
                    
                    // 如果是居服員，或者上面沒設密碼，就走原本的 addDoc (隨機門牌)
                    await addDoc(collection(db, "employees"), { ...empData, createdAt: new Date().toISOString() });
                    closeModal();
                    alert("✅ 儲存成功！");
                }
            } catch(e) { 
                console.error(e); 
                alert("儲存失敗：" + e.message); 
            }
            btn.innerHTML = "儲存變更"; btn.disabled = false;
        }

        async function deleteEmployee(id) { if(confirm("⚠️ 警告：建議使用「離職日期」而非刪除。\n\n確定要永久刪除此資料嗎？")) { await deleteDoc(doc(db, "employees", id)); } }
    </script>
</head>
<body class="bg-slate-100 min-h-screen p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-end mb-6 gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight mb-2">👥 員工資料庫 (人事中心)</h1>
                <div class="flex gap-4 text-sm text-slate-500 font-bold bg-white px-4 py-2 rounded-lg shadow-sm border">
                    <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-blue-500"></span> 居服員: <span id="count-caregiver" class="text-slate-800">0</span></span>
                    <span class="w-[1px] h-4 bg-slate-300"></span>
                    <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-purple-500"></span> 行政: <span id="count-admin" class="text-slate-800">0</span></span>
                </div>
            </div>
            <div class="flex gap-2">
                <div class="bg-white p-1 rounded-lg shadow-sm border flex">
                    <button onclick="setFilter('active')" data-type="active" class="filter-btn bg-slate-800 text-white px-3 py-1 rounded text-sm font-bold transition">在職</button>
                    <button onclick="setFilter('resigned')" data-type="resigned" class="filter-btn bg-white text-slate-600 px-3 py-1 rounded text-sm font-bold transition hover:bg-slate-50">離職</button>
                    <button onclick="setFilter('all')" data-type="all" class="filter-btn bg-white text-slate-600 px-3 py-1 rounded text-sm font-bold transition hover:bg-slate-50">全部</button>
                </div>
                <button onclick="openModal('add')" class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded-lg font-bold shadow-lg transition flex items-center gap-2">
                    <span>➕</span> 新增
                </button>
            </div>
        </div>

        <div class="flex bg-white rounded-t-2xl border-b border-slate-200 mt-4 overflow-hidden shadow-sm">
            <button id="tab-caregiver" onclick="switchRoleTab('caregiver')" class="flex-1 py-3 text-center font-bold text-lg tab-active-caregiver transition flex items-center justify-center gap-2">
                <span>🏠</span> 居服員資料
            </button>
            <button id="tab-admin" onclick="switchRoleTab('admin')" class="flex-1 py-3 text-center font-bold text-lg bg-white text-slate-500 hover:bg-slate-50 transition flex items-center justify-center gap-2">
                <span>💼</span> 行政人員資料
            </button>
        </div>

        <div class="bg-white rounded-b-2xl shadow-sm border-x border-b border-slate-200 overflow-hidden min-h-[400px]">
            <table class="w-full text-left">
                <thead id="list-header" class="bg-blue-50 text-blue-800 font-bold text-sm border-b border-blue-100">
                    <tr>
                        <th class="p-4 w-24">編號</th>
                        <th class="p-4">姓名 / 身分證</th>
                        <th class="p-4">到職狀態</th>
                        <th class="p-4">薪資參數摘要</th>
                        <th class="p-4 text-right">操作</th>
                    </tr>
                </thead>
                <tbody id="emp-table-body" class="divide-y divide-slate-100 text-sm"></tbody>
            </table>
        </div>
    </div>

    <div id="emp-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center backdrop-blur-sm transition-opacity">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-2xl transform transition-all scale-100 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-slate-800" id="modal-title">新增員工</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
            </div>
            
            <form id="emp-form" onsubmit="event.preventDefault(); saveEmployee();" class="space-y-6">
                <div class="grid grid-cols-3 gap-4">
                    <div><label class="block text-xs font-bold text-slate-500 mb-1">員工編號</label><input type="text" id="e-code" class="w-full border rounded p-2 font-mono font-bold bg-slate-50" required></div>
                    <div><label class="block text-xs font-bold text-slate-500 mb-1">真實姓名</label><input type="text" id="e-name" class="w-full border rounded p-2 font-bold" required></div>
                    <div><label class="block text-xs font-bold text-slate-500 mb-1">身分證字號</label><input type="text" id="e-idCard" class="w-full border rounded p-2 uppercase"></div>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">職務身分</label>
                        <select id="e-role" onchange="toggleAdminFields()" class="w-full border rounded p-2 font-bold text-slate-800 bg-white">
                            <option value="caregiver">🏠 居服員</option>
                            <option value="admin">💼 行政人員</option>
                        </select>
                    </div>
                    <div><label class="block text-xs font-bold text-blue-600 mb-1">到職日期</label><input type="date" id="e-join" class="w-full border border-blue-200 bg-blue-50 rounded p-2 font-bold" required></div>
                    <div><label class="block text-xs font-bold text-red-500 mb-1">離職日期 (選填)</label><input type="date" id="e-resign" class="w-full border border-red-200 bg-red-50 rounded p-2 text-red-600"></div>
                </div>
                
                <div class="bg-orange-50 p-3 rounded-lg border border-orange-200">
                    <div class="flex items-center gap-4">
                        <div class="flex-1">
                            <label class="block text-xs font-bold text-orange-800 mb-1">留職停薪 / 年資扣除 (天數)</label>
                            <input type="number" id="e-seniorityDeduction" min="0" class="w-full border border-orange-300 rounded p-2 text-right font-bold text-orange-700 bg-white" placeholder="0">
                        </div>
                        <div class="text-[10px] text-orange-600 flex-1 pt-4">
                            * 此數值會在計算特休假年資時自動扣除。<br>例如：員工請過 60 天育嬰假，請在此輸入 60。
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-4 bg-slate-50 p-3 rounded-lg border border-slate-200">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">銀行代碼</label>
                        <input type="text" id="e-bankCode" class="w-full border rounded p-2 text-center font-mono font-bold" placeholder="006" value="006">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-xs font-bold text-slate-500 mb-1">銀行帳號</label>
                        <input type="text" id="e-bankAccount" class="w-full border rounded p-2 font-mono" placeholder="請輸入帳號">
                    </div>
                </div>

                <hr class="border-slate-100">
                
                <div id="admin-fields" class="hidden space-y-4 bg-purple-50 p-4 rounded-xl border border-purple-100">
                    <h4 class="text-sm font-bold text-purple-800 flex items-center gap-2">💼 行政人員設定</h4>
                    
                    <div class="bg-white p-3 rounded border border-purple-200">
                        <label class="block text-xs font-bold text-purple-600 mb-1">🔑 系統登入密碼</label>
                        <input type="text" id="e-password" class="w-full border border-purple-300 rounded p-2 font-mono text-slate-700" placeholder="請設定登入密碼">
                        <p class="text-[10px] text-slate-400 mt-1">* 此密碼用於登入後台管理系統，請妥善保管。</p>
                    </div>

                    <div class="grid grid-cols-3 gap-4">
                        <div><label class="block text-xs font-bold text-slate-500 mb-1">本薪</label><input type="number" id="e-baseSalary" class="w-full border rounded p-2 text-right"></div>
                        <div><label class="block text-xs font-bold text-slate-500 mb-1">職務加給</label><input type="number" id="e-positionBonus" class="w-full border rounded p-2 text-right"></div>
                        <div><label class="block text-xs font-bold text-slate-500 mb-1">油資補助</label><input type="number" id="e-fuelSubsidy" class="w-full border rounded p-2 text-right"></div>
                    </div>
                    <div class="grid grid-cols-4 gap-4">
                        <div><label class="block text-xs font-bold text-slate-500 mb-1">投保級距</label><input type="number" id="e-insuranceLevel" class="w-full border rounded p-2 text-right text-sm"></div>
                        <div><label class="block text-xs font-bold text-slate-500 mb-1">勞保自付</label><input type="number" id="e-laborIns" class="w-full border rounded p-2 text-right text-sm"></div>
                        <div><label class="block text-xs font-bold text-slate-500 mb-1">健保自付</label><input type="number" id="e-healthIns" class="w-full border rounded p-2 text-right text-sm"></div>
                        <div><label class="block text-xs font-bold text-slate-500 mb-1">眷屬健保</label><input type="number" id="e-healthInsFamily" class="w-full border rounded p-2 text-right text-sm"></div>
                    </div>
                </div>

                <div id="caregiver-fields" class="space-y-4 bg-blue-50 p-4 rounded-xl border border-blue-100">
                    <h4 class="text-sm font-bold text-blue-800 flex items-center gap-2">🏠 居服員設定</h4>
                    <div class="grid grid-cols-3 gap-4">
                        <div><label class="block text-xs font-bold text-blue-800 mb-1">居服時薪</label><input type="number" id="e-hourlyWage" class="w-full border rounded p-2 text-right font-bold text-blue-600" value="230"></div>
                        <div><label class="block text-xs font-bold text-blue-800 mb-1">時薪加成</label><input type="number" id="e-hourlyBonus" class="w-full border rounded p-2 text-right" value="0"></div>
                        <div><label class="block text-xs font-bold text-blue-800 mb-1">轉場費率</label><input type="number" id="e-transitWage" class="w-full border rounded p-2 text-right font-bold text-blue-600" value="196"></div>
                    </div>
                    <div class="flex gap-6 items-center border-t border-blue-100 pt-3">
                        <div><label class="block text-xs font-bold text-slate-500 mb-1">勞退自提 (%)</label><input type="number" id="e-pensionRate" class="w-24 border rounded p-2 text-center" placeholder="0"></div>
                        <label class="flex items-center gap-2 cursor-pointer mt-4">
                            <input type="checkbox" id="e-hasLicense" class="w-5 h-5 text-blue-600 rounded"><span class="text-sm font-bold text-slate-700">持有單一級證照 (丙證)</span>
                        </label>
                    </div>
                </div>
                <div class="pt-2 flex gap-3">
                    <button type="button" onclick="closeModal()" class="flex-1 py-3 font-bold text-slate-500 bg-slate-100 rounded-xl hover:bg-slate-200 transition">取消</button>
                    <button type="submit" class="flex-1 py-3 font-bold text-white bg-blue-600 rounded-xl shadow-lg hover:bg-blue-700 transition">儲存變更</button>
                </div>
            </form>
        </div>
    </div>

    <div id="monthly-modal" class="fixed inset-0 bg-black bg-opacity-60 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-4xl h-[90vh] flex flex-col">
            <div class="p-4 border-b flex justify-between items-center bg-blue-600 text-white rounded-t-xl">
                <h3 class="text-lg font-bold">📅 月報紀錄：<span id="monthly-emp-name" class="text-yellow-300"></span></h3>
                <button onclick="closeMonthlyModal()" class="text-white hover:text-slate-200 font-bold text-xl">&times;</button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 bg-slate-50">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="md:col-span-1 bg-white p-4 rounded-xl shadow border border-slate-200 h-fit">
                        <h4 class="font-bold text-slate-700 mb-4 border-b pb-2">新增/編輯紀錄</h4>
                        <form id="monthly-form" onsubmit="event.preventDefault(); saveMonthlyRecord();">
                            <div class="mb-4"><label class="block text-xs font-bold text-slate-500 mb-1">所屬月份</label><input type="month" id="m-month" class="w-full p-2 border border-slate-300 rounded font-bold text-slate-700" required></div>
                            <div class="mb-4"><label class="block text-xs font-bold text-green-600 mb-1">本月申報薪資 (記帳用)</label><input type="number" id="m-salary" class="w-full p-2 border border-green-300 bg-green-50 rounded text-right font-bold" placeholder="0"></div>
                            <div class="p-3 bg-blue-50 rounded-lg border border-blue-100 mb-4 space-y-3">
                                <div class="text-xs font-bold text-blue-800 border-b border-blue-200 pb-1 mb-2">工時紀錄 (小時)</div>
                                <div class="flex gap-2">
                                    <div class="w-1/2"><label class="text-xs text-slate-500">一般工時</label><input type="number" id="m-work" step="0.001" class="w-full p-1 border rounded text-center" oninput="calcTotal()"></div>
                                    <div class="w-1/2"><label class="text-xs text-slate-500">一般轉場</label><input type="number" id="m-transit" step="0.001" class="w-full p-1 border rounded text-center" oninput="calcTotal()"></div>
                                </div>
                                <div class="text-xs text-right text-blue-600 font-bold">特休基數小計：<span id="calc-result">0</span> H</div>
                                <div class="flex gap-2 opacity-75">
                                    <div class="w-1/2"><label class="text-xs text-slate-400">加班工時</label><input type="number" id="m-ot-work" step="0.001" class="w-full p-1 border rounded text-center bg-slate-50"></div>
                                    <div class="w-1/2"><label class="text-xs text-slate-400">加班轉場</label><input type="number" id="m-ot-transit" step="0.001" class="w-full p-1 border rounded text-center bg-slate-50"></div>
                                </div>
                            </div>
                            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">💾 儲存紀錄</button>
                        </form>
                    </div>
                    <div class="md:col-span-2 bg-white rounded-xl shadow border border-slate-200 overflow-hidden flex flex-col">
                        <div class="bg-slate-100 p-3 font-bold text-slate-600 text-sm border-b">歷史紀錄 (由新到舊)</div>
                        <div class="overflow-x-auto flex-1">
                            <table class="w-full text-sm text-left"><thead class="bg-slate-50 text-slate-500"><tr><th class="p-2 text-center">月份</th><th class="p-2 text-right">薪資</th><th class="p-2 text-right text-blue-600">特休基數</th><th class="p-2 text-right">工時明細</th><th class="p-2 text-center">操作</th></tr></thead><tbody id="monthly-list"></tbody></table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
